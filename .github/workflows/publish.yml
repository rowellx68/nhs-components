name: Publish

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {} # least privilege; each job grants its own scopes

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # push version commit/tags via changesets
      pull-requests: write # open/update the version PR via changesets
      id-token: write # OIDC for npm provenance (provenance: true)
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          # persist-credentials is set to true: changesets/action pushes the version
          # branch and release tags via plain `git push`, which relies on the
          # checkout-persisted token for auth.
          persist-credentials: true

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          run_install: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: './pnpm-lock.yaml'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf
        id: changesets
        with:
          title: 'chore: version packages'
          commit: 'chore: version packages'
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_storybook:
    name: publish_storybook
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ needs.publish.outputs.published == 'true' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: write # push built Storybook to the gh-pages branch
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          run_install: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          cache: 'pnpm'
          cache-dependency-path: './pnpm-lock.yaml'

      - run: pnpm install --frozen-lockfile

      - run: |
          pnpm -F ./packages/react sb:build -o ./out-sb
          touch ./packages/react/out-sb/.nojekyll

      - uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f
        with:
          folder: ./packages/react/out-sb
