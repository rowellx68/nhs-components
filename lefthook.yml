pre-commit:
  jobs:
    - name: lint staged files
      glob: "*.{js,ts,jsx,tsx,vue,css,scss}"
      run: pnpm oxlint {staged_files}

    - name: lint github workflows
      glob: "./github/**/*.yml"
      run: "zizmor {staged_files} -p -q"

pre-push:
  parallel: true
  jobs:
    - name: typecheck
      run: pnpm typecheck

    - name: test
      run: pnpm test run --browser.headless

    - name: build
      run: pnpm build
